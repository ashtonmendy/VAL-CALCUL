<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul des Multiples</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 500px;
    margin: 30px auto;
    padding: 20px;
    background: #f5f5f5;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
}

h1 {
    text-align: center;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#calculer {
    background: #007aff;
    color: white;
}

#convertir {
    background: #34c759;
    color: white;
}

#resultat,
#conversion {
    margin-top: 20px;
    white-space: pre-line;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="card">

<h1>Calcul des Multiples</h1>

<label>Transversales</label>
<input type="number" id="transversale">

<label>Sixains</label>
<input type="number" id="sixain">

<label>Carrés</label>
<input type="number" id="carre">

<label>Chevaux</label>
<input type="number" id="cheval">

<label>Pleins</label>
<input type="number" id="plein">

<button id="calculer" onclick="calculerTotal()">
Calculer le total
</button>

<div id="resultat"></div>

<label>Taux de conversion (€)</label>
<input type="number" step="0.01" id="taux">

<button id="convertir" onclick="convertirEuros()">
Convertir en euros
</button>

<div id="conversion"></div>

</div>

<script>

let sommeTotale = 0;

function calculerTotal() {

    const transversale =
        (Number(document.getElementById("transversale").value) || 0) * 11;

    const sixain =
        (Number(document.getElementById("sixain").value) || 0) * 5;

    const carre =
        (Number(document.getElementById("carre").value) || 0) * 8;

    const cheval =
        (Number(document.getElementById("cheval").value) || 0) * 17;

    const plein =
        (Number(document.getElementById("plein").value) || 0) * 35;

    sommeTotale =
        transversale +
        sixain +
        carre +
        cheval +
        plein;

    document.getElementById("resultat").innerText =
`Transversale : ${Math.trunc(transversale)}
Sixain : ${Math.trunc(sixain)}
Carré : ${Math.trunc(carre)}
Chevaux : ${Math.trunc(cheval)}
Plein : ${Math.trunc(plein)}

Total en monnaie : ${Math.trunc(sommeTotale)}`;
}

function convertirEuros() {

    const taux =
        Number(document.getElementById("taux").value);

    if (!taux) {
        alert("Veuillez entrer un taux de conversion.");
        return;
    }

    const totalEuros = sommeTotale * taux;

    document.getElementById("conversion").innerHTML =
        `<strong>Total en euros : ${totalEuros.toFixed(2)} €</strong>`;
}

</script>

</body>
</html>
