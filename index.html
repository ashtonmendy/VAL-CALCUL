<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎲 Calculateur Roulette</title>

<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roulette">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
min-height:100vh;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:24px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:2rem;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:600;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#334155;
color:white;
font-size:16px;
}

input:focus{
outline:none;
border:2px solid #60a5fa;
}

.result{
margin-top:20px;
padding:20px;
background:#0f172a;
border-radius:18px;
}

.line{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total{
font-size:1.4rem;
font-weight:bold;
margin-top:15px;
color:#22c55e;
}

.euro{
font-size:2rem;
font-weight:bold;
text-align:center;
margin-top:15px;
color:#38bdf8;
}

.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.reset{
background:#ef4444;
color:white;
}

.copy{
background:#3b82f6;
color:white;
}

.footer{
text-align:center;
opacity:.7;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>🎲 Calculateur Roulette</h1>

<label>Transversales</label>
<input id="transversale" type="number" min="0">

<label>Sixains</label>
<input id="sixain" type="number" min="0">

<label>Carrés</label>
<input id="carre" type="number" min="0">

<label>Chevaux</label>
<input id="cheval" type="number" min="0">

<label>Pleins</label>
<input id="plein" type="number" min="0">

<label>Taux de conversion (€)</label>
<input id="taux" type="number" step="0.01" placeholder="0.01">

<div class="result">

<div class="line">
<span>Transversales</span>
<span id="rTrans">0</span>
</div>

<div class="line">
<span>Sixains</span>
<span id="rSixain">0</span>
</div>

<div class="line">
<span>Carrés</span>
<span id="rCarre">0</span>
</div>

<div class="line">
<span>Chevaux</span>
<span id="rCheval">0</span>
</div>

<div class="line">
<span>Pleins</span>
<span id="rPlein">0</span>
</div>

<div class="total">
Total : <span id="total">0</span>
</div>

<div class="euro">
<span id="euros">0.00 €</span>
</div>

</div>

<div class="buttons">
<button class="copy" onclick="copierResultat()">Copier</button>
<button class="reset" onclick="resetForm()">Réinitialiser</button>
</div>

</div>

<div class="footer">
Calcul automatique • Sauvegarde automatique
</div>

</div>

<script>

const inputs = document.querySelectorAll("input");

function calculer(){

const transversale=(+document.getElementById("transversale").value||0)*11;
const sixain=(+document.getElementById("sixain").value||0)*5;
const carre=(+document.getElementById("carre").value||0)*8;
const cheval=(+document.getElementById("cheval").value||0)*17;
const plein=(+document.getElementById("plein").value||0)*35;

const total=
transversale+
sixain+
carre+
cheval+
plein;

const taux=+document.getElementById("taux").value||0;
const euros=total*taux;

document.getElementById("rTrans").textContent=transversale;
document.getElementById("rSixain").textContent=sixain;
document.getElementById("rCarre").textContent=carre;
document.getElementById("rCheval").textContent=cheval;
document.getElementById("rPlein").textContent=plein;

document.getElementById("total").textContent=total;
document.getElementById("euros").textContent=euros.toFixed(2)+" €";

sauvegarder();

}

function sauvegarder(){

const data={};

inputs.forEach(input=>{
data[input.id]=input.value;
});

localStorage.setItem(
"rouletteData",
JSON.stringify(data)
);

}

function charger(){

const data=JSON.parse(
localStorage.getItem("rouletteData")
);

if(!data) return;

inputs.forEach(input=>{
if(data[input.id]){
input.value=data[input.id];
}
});

calculer();

}

function resetForm(){

if(!confirm("Réinitialiser ?")) return;

inputs.forEach(input=>{
input.value="";
});

localStorage.removeItem("rouletteData");

calculer();

}

function copierResultat(){

const texte=
"Total : "+
document.getElementById("total").textContent+
"\nEuros : "+
document.getElementById("euros").textContent;

navigator.clipboard.writeText(texte);

alert("Résultat copié");
}

inputs.forEach(input=>{
input.addEventListener("input",calculer);
});

charger();

</script>

</body>
</html>
